name: Refresh Instagram Token

on:
  schedule:
    # 매주 월요일 02:00 UTC (60일 만료 훨씬 전에 주기적으로 갱신)
    - cron: "0 2 * * 1"
  workflow_dispatch: {}

jobs:
  refresh:
    runs-on: ubuntu-latest
    steps:
      - name: 체크아웃
        uses: actions/checkout@v4

      - name: Node 설정
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: 의존성 설치
        run: npm install libsodium-wrappers

      - name: 토큰 갱신 & 시크릿 업데이트
        env:
          IG_ACCESS_TOKEN: ${{ secrets.IG_ACCESS_TOKEN }}
          GH_PAT: ${{ secrets.GH_PAT }}
        run: node refresh_token.mjs
